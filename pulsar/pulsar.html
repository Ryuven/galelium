<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Pulsar — Galelium Corporation</title>
  <meta name="robots" content="noindex,nofollow"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="preload" as="style"
    href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap"
    onload="this.onload=null;this.rel='stylesheet'"/>
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap"/></noscript>
<style>
:root{
  --bg:#08080d;--surface:#0e0e16;--surface-2:#131320;--surface-3:#191926;--surface-4:#1e1e2e;
  --border:rgba(255,255,255,.065);--border-h:rgba(255,255,255,.11);
  --accent:#c8a96e;--accent-dim:rgba(200,169,110,.09);--accent-mid:rgba(200,169,110,.26);
  --text:#e4e2dc;--muted:#78766e;--muted-2:#48463f;--muted-3:#28261f;
  --green:#4caf82;--red:#d06070;--blue:#6a9fd8;
  --font-display:'Syne',sans-serif;--font:'DM Sans',system-ui,sans-serif;
  --sb-w:260px;--topbar-h:52px;--mob-nav-h:58px;
  --t:.22s;--tf:.14s;--ease:cubic-bezier(.4,0,.2,1);--r:6px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-weight:300;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit;color:inherit;background:none;border:none;outline:none}
a{color:inherit;text-decoration:none}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--surface-4);border-radius:2px}

/* AUTH */
#auth-screen{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;transition:opacity .4s ease}
#auth-screen.fade-out{opacity:0;pointer-events:none}
.auth-logo{display:flex;align-items:center;gap:10px}
.auth-logo-mark{width:32px;height:32px;background:var(--accent);display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(200,169,110,.25);border-radius:4px}
.auth-logo-text{font-family:var(--font-display);font-weight:800;font-size:1.1rem;color:var(--text)}
.auth-logo-sub{font-size:.55rem;letter-spacing:.25em;text-transform:uppercase;color:var(--muted-2);margin-top:2px}
.auth-bar{width:120px;height:2px;background:var(--surface-3);overflow:hidden;border-radius:1px}
.auth-bar-fill{height:100%;background:var(--accent);width:60%;animation:authSlide 1.4s ease-in-out infinite}
@keyframes authSlide{0%{transform:translateX(-100%)}50%{transform:translateX(0)}100%{transform:translateX(200%)}}
.auth-status-text{font-size:.62rem;color:var(--muted-2);letter-spacing:.06em}

/* SHELL */
#shell{display:none;height:100svh;grid-template-columns:var(--sb-w) 1fr;grid-template-areas:"sidebar main"}
#shell.active{display:grid}

/* SIDEBAR */
#sidebar{grid-area:sidebar;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;position:relative;z-index:10}
#sidebar::before{content:'';position:absolute;top:0;left:0;right:0;height:180px;background:radial-gradient(ellipse 200% 100% at 50% -20%,rgba(200,169,110,.05) 0%,transparent 70%);pointer-events:none}
.ws-head{height:var(--topbar-h);display:flex;align-items:center;gap:10px;padding:0 14px;border-bottom:1px solid var(--border);flex-shrink:0;position:relative;z-index:1}
.ws-logo-mark{width:26px;height:26px;background:var(--accent);flex-shrink:0;display:flex;align-items:center;justify-content:center;box-shadow:0 0 12px rgba(200,169,110,.2);border-radius:4px}
.ws-title{font-family:var(--font-display);font-weight:800;font-size:.8rem;letter-spacing:.02em;flex:1;color:var(--text)}
.ws-corp{font-size:.54rem;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-top:1px}
.ws-status-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);flex-shrink:0}
.sb-nav{flex:1;overflow-y:auto;padding:8px 0;position:relative;z-index:1}
.sb-section{margin-bottom:4px}
.sb-label{display:flex;align-items:center;justify-content:space-between;padding:8px 14px 4px;font-size:.56rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted-2)}
.sb-label-add{width:20px;height:20px;display:flex;align-items:center;justify-content:center;border-radius:4px;transition:background var(--tf),color var(--tf);color:var(--muted-2);font-size:15px;line-height:1}
.sb-label-add:hover{background:var(--surface-3);color:var(--accent)}
.sb-item{display:flex;align-items:center;gap:8px;padding:6px 10px 6px 14px;font-size:.76rem;color:var(--muted);cursor:pointer;border-radius:var(--r);margin:1px 6px;transition:background var(--tf),color var(--tf);position:relative}
.sb-item:hover{background:var(--surface-2);color:var(--text)}
.sb-item.active{background:var(--accent-dim);color:var(--text)}
.sb-item.active::before{content:'';position:absolute;left:-6px;top:4px;bottom:4px;width:2px;background:var(--accent);border-radius:1px}
.sb-item-icon{font-size:.72rem;width:16px;text-align:center;flex-shrink:0;opacity:.6}
.sb-item.active .sb-item-icon{opacity:1}
.sb-item-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dm-item{display:flex;align-items:center;gap:9px;padding:6px 10px 6px 14px;cursor:pointer;border-radius:var(--r);margin:1px 6px;transition:background var(--tf)}
.dm-item:hover{background:var(--surface-2)}
.dm-item.active{background:var(--accent-dim)}
.dm-avatar{width:26px;height:26px;border-radius:7px;background:var(--surface-3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:600;color:var(--accent);flex-shrink:0;position:relative}
.presence-dot{position:absolute;bottom:-2px;right:-2px;width:8px;height:8px;border-radius:50%;border:2px solid var(--surface)}
.presence-dot.online{background:var(--green)}.presence-dot.away{background:#d4a843}.presence-dot.offline{background:var(--muted-2)}
.dm-name{font-size:.75rem;color:var(--muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dm-item.active .dm-name,.dm-item:hover .dm-name{color:var(--text)}
.user-panel{height:56px;border-top:1px solid var(--border);display:flex;align-items:center;gap:9px;padding:0 10px;flex-shrink:0;position:relative;z-index:1;background:rgba(8,8,13,.6)}
.user-avatar{width:32px;height:32px;border-radius:9px;background:var(--accent-dim);border:1px solid var(--accent-mid);display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;color:var(--accent);flex-shrink:0;cursor:pointer;transition:border-color var(--tf)}
.user-avatar:hover{border-color:var(--accent)}
.user-info{flex:1;min-width:0}
.user-name{font-size:.74rem;font-weight:500;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.user-status{font-size:.6rem;color:var(--muted);display:flex;align-items:center;gap:4px}
.user-status-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}
.user-actions{display:flex;gap:2px}
.icon-btn{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:var(--r);color:var(--muted);transition:background var(--tf),color var(--tf)}
.icon-btn:hover{background:var(--surface-3);color:var(--text)}

/* MAIN */
#main{grid-area:main;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.topbar{height:var(--topbar-h);flex-shrink:0;display:flex;align-items:center;gap:10px;padding:0 16px;border-bottom:1px solid var(--border);background:var(--bg);position:relative;z-index:5}
.topbar-name{font-size:.85rem;font-weight:500;display:flex;align-items:center;gap:7px;min-width:0}
.topbar-hash{color:var(--muted);font-size:.9rem;flex-shrink:0}
.topbar-ch-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.topbar-desc{font-size:.68rem;color:var(--muted);margin-left:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}
.topbar-actions{display:flex;gap:4px;margin-left:auto;flex-shrink:0}
#msg-list{flex:1;overflow-y:auto;padding:12px 0 4px;display:flex;flex-direction:column}
.date-div{display:flex;align-items:center;gap:10px;padding:12px 20px}
.date-div-line{flex:1;height:1px;background:var(--border)}
.date-div-text{font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted-2);white-space:nowrap}
.msg-group{padding:1px 0;position:relative}
.msg-group:hover .msg-actions{opacity:1;pointer-events:auto}
.msg-row{display:flex;align-items:flex-start;gap:12px;padding:2px 20px;position:relative;transition:background var(--tf)}
.msg-row:hover,.msg-group:hover .msg-row:first-child{background:rgba(255,255,255,.018)}
.msg-avatar{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;color:var(--accent);background:var(--accent-dim);border:1px solid var(--accent-mid);flex-shrink:0;margin-top:2px}
.msg-avatar.placeholder{background:transparent;border:none}
.msg-body{flex:1;min-width:0}
.msg-meta{display:flex;align-items:baseline;gap:8px;margin-bottom:3px}
.msg-author{font-size:.76rem;font-weight:500;color:var(--text)}
.msg-author.is-me{color:var(--accent)}
.msg-time{font-size:.6rem;color:var(--muted-2)}
.msg-edited{font-size:.58rem;color:var(--muted-2);font-style:italic}
.msg-text{font-size:.8rem;line-height:1.6;color:var(--text);word-break:break-word;white-space:pre-wrap}
.msg-text a{color:var(--blue);text-decoration:underline}
.msg-text code{background:var(--surface-3);padding:1px 5px;border-radius:3px;font-size:.75rem;font-family:monospace}
.msg-text.deleted{color:var(--muted-2);font-style:italic}
.msg-text strong{font-weight:600}.msg-text em{font-style:italic}
.msg-reply-ref{display:flex;align-items:center;gap:8px;padding:4px 10px;margin-bottom:5px;border-left:2px solid var(--accent-mid);background:var(--accent-dim);border-radius:0 var(--r) var(--r) 0;cursor:pointer}
.msg-reply-author{font-size:.64rem;color:var(--accent);font-weight:500}
.msg-reply-text{font-size:.68rem;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.msg-reactions{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.reaction-btn{display:inline-flex;align-items:center;gap:4px;background:var(--surface-2);border:1px solid var(--border);padding:2px 8px;border-radius:12px;font-size:.72rem;cursor:pointer;transition:all var(--tf);user-select:none}
.reaction-btn:hover{border-color:var(--border-h);background:var(--surface-3)}
.reaction-btn.active{border-color:var(--accent-mid);background:var(--accent-dim);color:var(--accent)}
.reaction-count{font-size:.65rem;color:var(--muted)}
.reaction-btn.active .reaction-count{color:var(--accent)}
.msg-actions{position:absolute;top:-14px;right:20px;display:flex;gap:2px;background:var(--surface-2);border:1px solid var(--border);padding:3px 4px;border-radius:var(--r);opacity:0;pointer-events:none;transition:opacity var(--tf);z-index:10;box-shadow:0 4px 16px rgba(0,0,0,.4)}
.msg-action-btn{width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:3px;color:var(--muted);font-size:.75rem;transition:background var(--tf),color var(--tf);cursor:pointer}
.msg-action-btn:hover{background:var(--surface-3);color:var(--text)}
.msg-action-btn.danger:hover{background:rgba(208,96,112,.12);color:var(--red)}
.msg-edit-wrap{margin-top:4px}
.msg-edit-input{width:100%;background:var(--surface-2);border:1px solid var(--border);color:var(--text);font-size:.8rem;line-height:1.6;padding:8px 12px;border-radius:var(--r);resize:none;min-height:60px;transition:border-color var(--tf)}
.msg-edit-input:focus{border-color:var(--accent-mid)}
.msg-edit-btns{display:flex;gap:6px;margin-top:6px;font-size:.65rem}
.msg-edit-save{background:var(--accent);color:#08080d;padding:4px 12px;border-radius:var(--r);font-weight:600;transition:opacity var(--tf)}
.msg-edit-save:hover{opacity:.85}
.msg-edit-cancel{color:var(--muted);padding:4px 10px;transition:color var(--tf)}
.msg-edit-cancel:hover{color:var(--text)}
.msg-edit-hint{font-size:.62rem;color:var(--muted-2);margin-left:auto}
#typing-bar{padding:4px 20px;min-height:24px;font-size:.66rem;color:var(--muted);display:flex;align-items:center;gap:6px}
.typing-dots span{display:inline-block;width:4px;height:4px;border-radius:50%;background:var(--muted);margin:0 1px;animation:typingBounce 1.2s ease-in-out infinite}
.typing-dots span:nth-child(2){animation-delay:.15s}.typing-dots span:nth-child(3){animation-delay:.3s}
@keyframes typingBounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-4px)}}

/* INPUT */
.input-wrap{padding:0 14px 14px;flex-shrink:0}
.input-reply-bar{display:none;align-items:center;gap:8px;background:var(--surface-2);border:1px solid var(--border);border-bottom:none;border-radius:var(--r) var(--r) 0 0;padding:8px 12px}
.input-reply-bar.visible{display:flex}
.input-reply-to{font-size:.68rem;color:var(--muted)}.input-reply-to strong{color:var(--accent)}
.input-reply-preview{font-size:.68rem;color:var(--muted-2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.input-reply-close{color:var(--muted);padding:2px;transition:color var(--tf)}.input-reply-close:hover{color:var(--text)}
.input-box{display:flex;align-items:flex-end;gap:8px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r);padding:7px 10px;transition:border-color var(--tf)}
.input-reply-bar.visible+.input-box{border-radius:0 0 var(--r) var(--r)}
.input-box:focus-within{border-color:var(--border-h)}
#msg-input{flex:1;background:none;color:var(--text);font-size:.82rem;line-height:1.55;resize:none;min-height:22px;max-height:160px;overflow-y:auto;padding:4px 0}
#msg-input::placeholder{color:var(--muted-2)}
.input-emoji-btn{font-size:1.1rem;padding:2px 4px;line-height:1;transition:transform var(--tf);color:var(--muted);cursor:pointer;flex-shrink:0}
.input-emoji-btn:hover{transform:scale(1.15);color:var(--accent)}
.input-send{width:32px;height:32px;background:var(--accent);flex-shrink:0;display:flex;align-items:center;justify-content:center;border-radius:var(--r);transition:opacity var(--tf),transform var(--tf)}
.input-send:hover{opacity:.85;transform:scale(1.04)}.input-send:disabled{opacity:.3;cursor:not-allowed;transform:none}
.input-hint{font-size:.6rem;color:var(--muted-2);text-align:right;margin-top:4px;padding-right:2px}

/* EMOJI */
.emoji-picker{position:absolute;bottom:76px;right:14px;z-index:100;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r);padding:10px;display:none;grid-template-columns:repeat(6,1fr);gap:4px;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.emoji-picker.open{display:grid}
.ep-emoji{font-size:1.3rem;padding:4px;text-align:center;border-radius:3px;cursor:pointer;transition:background var(--tf);line-height:1}
.ep-emoji:hover{background:var(--surface-3)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s ease}
.modal-overlay.open{opacity:1;pointer-events:auto}
.modal{background:var(--surface);border:1px solid var(--border);width:min(460px,calc(100vw - 24px));animation:scaleIn .22s var(--ease) both;position:relative;border-radius:var(--r)}
@keyframes scaleIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.modal::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),transparent 60%);border-radius:var(--r) var(--r) 0 0}
.modal-head{padding:20px 22px 16px;border-bottom:1px solid var(--border)}
.modal-title{font-family:var(--font-display);font-weight:800;font-size:.95rem}
.modal-body{padding:20px 22px}
.modal-foot{padding:14px 22px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.modal-close{position:absolute;top:12px;right:12px;color:var(--muted);padding:6px;transition:color var(--tf);border-radius:4px}
.modal-close:hover{color:var(--text);background:var(--surface-3)}
.field{margin-bottom:14px}
.field-label{font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted-2);margin-bottom:6px;display:block}
.field-input{width:100%;background:var(--surface-2);border:1px solid var(--border);color:var(--text);font-size:.82rem;padding:10px 12px;border-radius:var(--r);transition:border-color var(--tf)}
.field-input:focus{border-color:var(--accent-mid)}
.field-input::placeholder{color:var(--muted-2)}
.btn{padding:9px 18px;font-size:.7rem;font-weight:500;letter-spacing:.04em;border-radius:var(--r);transition:opacity var(--tf),background var(--tf);cursor:pointer}
.btn-ghost{border:1px solid var(--border);color:var(--muted)}.btn-ghost:hover{border-color:var(--border-h);color:var(--text)}
.btn-primary{background:var(--accent);color:#08080d;font-weight:700}.btn-primary:hover:not(:disabled){opacity:.87}.btn-primary:disabled{opacity:.5;cursor:not-allowed}

/* TOAST */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(70px);z-index:9999;background:var(--surface-2);border:1px solid var(--border);padding:9px 18px;font-size:.74rem;display:flex;align-items:center;gap:8px;border-radius:var(--r);opacity:0;transition:transform .25s var(--ease),opacity .2s ease;pointer-events:none;box-shadow:0 8px 32px rgba(0,0,0,.5);white-space:nowrap}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}
#toast.ok{border-color:rgba(76,175,130,.4)}.toast-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
#toast.err{border-color:rgba(208,96,112,.4)}
#toast.ok .toast-dot{background:var(--green)}#toast.err .toast-dot{background:var(--red)}

/* NO CHANNEL */
#no-channel{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:40px;text-align:center}
.nc-icon{width:64px;height:64px;background:var(--surface-2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;border-radius:16px}
.nc-title{font-family:var(--font-display);font-weight:800;font-size:1.3rem}
.nc-sub{font-size:.76rem;color:var(--muted);max-width:280px;line-height:1.6}
.nc-mob-btn{display:none;align-items:center;gap:8px;padding:10px 20px;border:1px solid var(--border);border-radius:var(--r);font-size:.75rem;color:var(--muted);cursor:pointer;transition:background var(--tf),color var(--tf)}
.nc-mob-btn:hover{background:var(--surface-2);color:var(--text)}

/* CONNECTION */
#conn-banner{display:none;position:fixed;top:0;left:0;right:0;z-index:500;background:rgba(208,96,112,.12);border-bottom:1px solid rgba(208,96,112,.25);padding:7px 20px;font-size:.68rem;color:var(--red);align-items:center;justify-content:center;gap:8px}
#conn-banner.show{display:flex}

/* SKELETON */
.sk-line{height:9px;background:var(--surface-3);border-radius:3px;margin:5px 0;animation:skPulse 1.6s ease-in-out infinite}
@keyframes skPulse{0%,100%{opacity:.4}50%{opacity:.8}}

/* MOBILE BOTTOM NAV */
#mob-nav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:150;height:var(--mob-nav-h);background:var(--surface);border-top:1px solid var(--border);align-items:stretch}
.mob-nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:.6rem;letter-spacing:.05em;color:var(--muted);cursor:pointer;transition:color var(--tf);border:none;background:none;padding:6px 4px}
.mob-nav-btn.active{color:var(--accent)}
.mob-nav-icon{position:relative}

/* MOBILE OVERRIDES */
.mob-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:190;opacity:0;pointer-events:none;transition:opacity .2s}
.mob-overlay.open{opacity:1;pointer-events:auto}
.topbar-mob-menu{display:none;width:36px;height:36px;align-items:center;justify-content:center;border-radius:var(--r);color:var(--muted);transition:background var(--tf),color var(--tf);flex-shrink:0}
.topbar-mob-menu:hover{background:var(--surface-2);color:var(--text)}

@media(max-width:780px){
  :root{--sb-w:min(300px,100vw)}
  #shell{grid-template-columns:1fr;grid-template-areas:"main"}
  #sidebar{position:fixed;top:0;left:0;bottom:var(--mob-nav-h);width:var(--sb-w);transform:translateX(-100%);transition:transform .28s cubic-bezier(.32,.72,0,1);z-index:200}
  #sidebar.open{transform:translateX(0)}

<script type="module">
import { initializeApp }        from 'https://www.gstatic.com/firebasejs/11.8.1/firebase-app.js';
import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/11.8.1/firebase-auth.js';
import {
  getFirestore, collection, doc, addDoc, setDoc, getDoc, getDocs,
  updateDoc, onSnapshot, serverTimestamp,
  query, orderBy, limit, where, arrayUnion, arrayRemove
} from 'https://www.gstatic.com/firebasejs/11.8.1/firebase-firestore.js';

const app  = initializeApp({ apiKey:'AIzaSyC4PKkma67vVXeZvlSv0MNRK5cQvcAvjpg', authDomain:'admingalelium.firebaseapp.com', projectId:'admingalelium', storageBucket:'admingalelium.firebasestorage.app', messagingSenderId:'565330048254', appId:'1:565330048254:web:bab36aae480989e2bfe1af' });
const auth = getAuth(app);
const fdb  = getFirestore(app);

let me = null, currentCh = null, msgUnsub = null, replyTo = null, editingId = null;
let allUsers = {}, usersLoaded = false;

const EMOJIS = ['👍','❤️','🔥','😂','😮','👏','✅','🎉','🚀','💯'];
const REACT5  = ['👍','❤️','🔥','😂','😮'];

const $ = id => document.getElementById(id);
let _tt;
function toast(msg, type='ok') {
  const el=$('toast'); $('toast-msg').textContent=msg; el.className='show '+type;
  clearTimeout(_tt); _tt=setTimeout(()=>el.className='', 3500);
}
function ini(n='') { return (n||'?').trim()[0].toUpperCase(); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtT(ts) {
  if(!ts) return '';
  const d=ts.toDate?ts.toDate():new Date(ts), diff=Math.floor((Date.now()-d)/86400000);
  if(diff===0) return d.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
  if(diff===1) return 'вчера '+d.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
  return d.toLocaleDateString('ru-RU',{day:'numeric',month:'short'});
}
function fmtD(ts) {
  if(!ts) return '';
  const d=ts.toDate?ts.toDate():new Date(ts), diff=Math.floor((Date.now()-d)/86400000);
  if(diff===0) return 'Сегодня'; if(diff===1) return 'Вчера';
  return d.toLocaleDateString('ru-RU',{day:'numeric',month:'long',year:'numeric'});
}
function md(t) {
  return esc(t)
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.*?)\*/g,'<em>$1</em>')
    .replace(/`(.*?)`/g,'<code>$1</code>')
    .replace(/(https?:\/\/[^\s]+)/g,'<a href="$1" target="_blank" rel="noopener">$1</a>');
}
function ar(ta) { ta.style.height='auto'; ta.style.height=Math.min(ta.scrollHeight,160)+'px'; }

window.addEventListener('online',  () => $('conn-banner').classList.remove('show'));
window.addEventListener('offline', () => $('conn-banner').classList.add('show'));

/* ── Auth ── */
const authTO = setTimeout(() => {
  $('auth-status-text').textContent='Ошибка соединения…';
  setTimeout(()=>location.replace('login.html'),1500);
}, 10000);

onAuthStateChanged(auth, async user => {
  clearTimeout(authTO);
  if (!user) { $('auth-status-text').textContent='Перенаправление…'; setTimeout(()=>location.replace('login.html'),400); return; }
  $('auth-status-text').textContent='Загрузка профиля…';

  let p = { uid:user.uid, displayName:user.displayName||user.email, email:user.email, role:'user' };
  try { const s=await getDoc(doc(fdb,'users',user.uid)); if(s.exists()) Object.assign(p,s.data()); } catch(e){}
  me = p;

  updatePresence('online');
  document.addEventListener('visibilitychange', ()=>updatePresence(document.hidden?'away':'online'));
  window.addEventListener('beforeunload', ()=>updatePresence('offline'));

  $('auth-screen').classList.add('fade-out');
  setTimeout(()=>{ $('auth-screen').style.display='none'; $('shell').classList.add('active'); }, 400);

  $('my-avatar').textContent = ini(me.displayName);
  $('mob-my-avatar').textContent = ini(me.displayName);
  $('my-name').textContent   = me.displayName || me.email;

  // FIX: await users before starting UI — guarantees DM search works immediately
  await loadAllUsers();
  startChannelListener();
  initUI();
});

async function updatePresence(status) {
  if(!me) return;
  try { await setDoc(doc(fdb,'pulsar_presence',me.uid),{status,displayName:me.displayName,email:me.email,uid:me.uid,updatedAt:serverTimestamp()},{merge:true}); } catch(e){}
}

// FIX: proper async user loading with flag
async function loadAllUsers() {
  try {
    const snap = await getDocs(collection(fdb,'users'));
    snap.forEach(d => { allUsers[d.id]={uid:d.id,...d.data()}; });
    usersLoaded = true;
    onSnapshot(collection(fdb,'pulsar_presence'), snap => {
      snap.forEach(d => {
        if(allUsers[d.id]) allUsers[d.id].presence=d.data();
        else allUsers[d.id]={uid:d.id,...d.data(),presence:d.data()};
      });
      renderDMList();
    });
  } catch(e) { console.error('loadAllUsers:',e); usersLoaded=true; }
}

function startChannelListener() {
  onSnapshot(query(collection(fdb,'pulsar_channels'),orderBy('order','asc')), snap => {
    const chs=[], dms=[];
    snap.forEach(d => {
      const ch={id:d.id,...d.data()};
      if(ch.type==='direct') { if((ch.members||[]).includes(me.uid)) dms.push(ch); }
      else chs.push(ch);
    });
    renderChannelList(chs);
    renderDMListFromChannels(dms);
  }, e=>console.error('channels:',e));
}

function renderChannelList(chs) {
  const list=$('channel-list');
  if(!chs.length){list.innerHTML='<div style="padding:6px 14px;font-size:.68rem;color:var(--muted-2)">Каналов нет</div>';return;}
  list.innerHTML=chs.map(ch=>`
    <div class="sb-item ${currentCh?.id===ch.id?'active':''}" data-chid="${esc(ch.id)}" role="button" tabindex="0">
      <span class="sb-item-icon">${ch.type==='private'?'🔒':'#'}</span>
      <span class="sb-item-name">${esc(ch.name)}</span>
    </div>`).join('');
  list.querySelectorAll('.sb-item').forEach(el=>el.addEventListener('click',()=>openChannel(el.dataset.chid)));
}

let _dmChs=[];
function renderDMListFromChannels(dms){_dmChs=dms;renderDMList();}
function renderDMList() {
  const list=$('dm-list');
  if(!_dmChs.length){list.innerHTML='<div style="padding:6px 14px;font-size:.68rem;color:var(--muted-2)">Нет переписок</div>';return;}
  list.innerHTML=_dmChs.map(ch=>{
    const oid=(ch.members||[]).find(u=>u!==me.uid);
    const o=allUsers[oid]||{displayName:'Пользователь'};
    const pr=o.presence?.status||'offline';
    return `<div class="dm-item ${currentCh?.id===ch.id?'active':''}" data-chid="${esc(ch.id)}" role="button" tabindex="0">
      <div class="dm-avatar">${ini(o.displayName||o.email)}<div class="presence-dot ${pr}"></div></div>
      <span class="dm-name">${esc(o.displayName||o.email||'—')}</span>
    </div>`;
  }).join('');
  list.querySelectorAll('.dm-item').forEach(el=>el.addEventListener('click',()=>openChannel(el.dataset.chid)));
}

async function openChannel(chId) {
  if(currentCh?.id===chId){closeSidebar();return;}
  if(msgUnsub){msgUnsub();msgUnsub=null;}
  let chData;
  try {
    const s=await getDoc(doc(fdb,'pulsar_channels',chId));
    if(!s.exists()){toast('Канал не найден','err');return;}
    chData={id:s.id,...s.data()};
  } catch(e){toast('Ошибка: '+e.message,'err');return;}
  currentCh=chData; replyTo=null;
  $('no-channel').style.display='none';
  $('conversation').style.display='flex';
  if(chData.type==='direct'){
    const oid=(chData.members||[]).find(u=>u!==me.uid), o=allUsers[oid]||{};
    $('ch-icon').textContent='@'; $('ch-name').textContent=o.displayName||o.email||'DM'; $('ch-desc').textContent=o.email||'';
  } else {
    $('ch-icon').textContent=chData.type==='private'?'🔒':'#';
    $('ch-name').textContent=chData.name||''; $('ch-desc').textContent=chData.description||'';
  }
  document.querySelectorAll('.sb-item,.dm-item').forEach(el=>el.classList.toggle('active',el.dataset.chid===chId));
  clearReply(); startMessageListener(chId); closeSidebar();
  setTimeout(()=>$('msg-input').focus(),150);
}

function startMessageListener(chId) {
  const list=$('msg-list');
  list.innerHTML='<div style="padding:24px;text-align:center;color:var(--muted);font-size:.75rem">Загрузка…</div>';
  const q=query(collection(fdb,'pulsar_channels',chId,'messages'),orderBy('clientTs','asc'),limit(120));
  let first=true;
  msgUnsub=onSnapshot(q, snap=>{
    const near=list.scrollHeight-list.scrollTop-list.clientHeight<120;
    renderMessages(snap.docs.map(d=>({id:d.id,...d.data()})));
    if(first){scrollBot();first=false;} else if(near) scrollBot();
  }, e=>{list.innerHTML=`<div style="padding:20px;color:var(--red);font-size:.75rem;text-align:center">Ошибка: ${esc(e.message)}</div>`;});
}

function renderMessages(msgs) {
  const list=$('msg-list');
  if(!msgs.length){list.innerHTML='<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--muted);padding:40px;text-align:center"><div style="font-size:2rem">💬</div><div style="font-size:.78rem">Начните общение!</div></div>';return;}
  let html='', pDate='', pAId='', pTs=0;
  msgs.forEach(msg=>{
    const ts=msg.ts?.toDate?.()||new Date(msg.clientTs||Date.now());
    const dk=ts.toDateString();
    if(dk!==pDate){html+=`<div class="date-div"><div class="date-div-line"></div><div class="date-div-text">${fmtD(msg.ts||{toDate:()=>new Date(msg.clientTs)})}</div><div class="date-div-line"></div></div>`;pDate=dk;pAId='';}
    const isMe=msg.authorId===me.uid, grouped=msg.authorId===pAId&&(msg.clientTs-pTs)<300000;
    const react=msg.reactions||{}, rl=REACT5.filter(e=>react[e]?.length);
    html+=`<div class="msg-group" data-msgid="${esc(msg.id)}">
      <div class="msg-row">
        <div class="msg-avatar ${grouped?'placeholder':''}">${grouped?'':esc(ini(msg.authorName))}</div>
        <div class="msg-body">
          ${!grouped?`<div class="msg-meta"><span class="msg-author ${isMe?'is-me':''}">${esc(msg.authorName)}</span><span class="msg-time">${fmtT(msg.ts||{toDate:()=>new Date(msg.clientTs)})}</span>${msg.edited?'<span class="msg-edited">(изм.)</span>':''}</div>`:''}
          ${msg.replyTo?`<div class="msg-reply-ref" data-scroll="${esc(msg.replyTo.id)}"><span class="msg-reply-author">${esc(msg.replyTo.authorName)}</span><span class="msg-reply-text">${esc(msg.replyTo.text?.slice(0,80))}</span></div>`:''}
          ${msg.deleted?'<div class="msg-text deleted">Сообщение удалено</div>':`<div class="msg-text" data-msgid="${esc(msg.id)}">${md(msg.text)}</div>`}
          ${rl.length?`<div class="msg-reactions">${rl.map(e=>`<button class="reaction-btn ${react[e]?.includes(me.uid)?'active':''}" data-msgid="${esc(msg.id)}" data-emoji="${e}">${e}<span class="reaction-count">${react[e].length}</span></button>`).join('')}</div>`:''}
        </div>
      </div>
      <div class="msg-actions">
        ${REACT5.slice(0,4).map(e=>`<button class="msg-action-btn react-quick" data-msgid="${esc(msg.id)}" data-emoji="${e}" title="${e}">${e}</button>`).join('')}
        <button class="msg-action-btn" data-action="reply" data-msgid="${esc(msg.id)}" title="Ответить"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M1 7V4a3 3 0 013-3h5M1 7l3-3M1 7l3 3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
        ${isMe&&!msg.deleted?`<button class="msg-action-btn" data-action="edit" data-msgid="${esc(msg.id)}" title="Ред."><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M8.5 1.5a1.5 1.5 0 012 2L4 10H2v-2l6.5-6.5z" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg></button><button class="msg-action-btn danger" data-action="delete" data-msgid="${esc(msg.id)}" title="Удалить"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 3h8M4 3V2h4v1M10 3l-.8 7H2.8L2 3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg></button>`:''}
      </div>
    </div>`;
    pAId=msg.authorId; pTs=msg.clientTs||0;
  });
  list.innerHTML=html;
  list.querySelectorAll('[data-action]').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();msgAction(b.dataset.action,b.dataset.msgid,msgs);}));
  list.querySelectorAll('.react-quick,.reaction-btn').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();toggleReact(b.dataset.msgid,b.dataset.emoji);}));
  list.querySelectorAll('[data-scroll]').forEach(el=>el.addEventListener('click',()=>{const t=list.querySelector(`[data-msgid="${el.dataset.scroll}"]`);if(t)t.scrollIntoView({behavior:'smooth',block:'center'});}));
}

function msgAction(action, msgId, msgs) {
  const msg=msgs.find(m=>m.id===msgId); if(!msg) return;
  if(action==='reply'){
    replyTo={id:msg.id,text:msg.text,authorName:msg.authorName};
    $('reply-bar').classList.add('visible');
    $('reply-to-name').textContent=msg.authorName;
    $('reply-preview').textContent=msg.text?.slice(0,80);
    $('msg-input').focus();
  }
  if(action==='edit'&&msg.authorId===me.uid&&!msg.deleted) startEdit(msgId,msg.text);
  if(action==='delete'&&msg.authorId===me.uid){if(!confirm('Удалить сообщение?'))return;delMsg(msgId);}
}

function startEdit(msgId,text){
  cancelEdit(); editingId=msgId;
  const el=document.querySelector(`.msg-text[data-msgid="${msgId}"]`); if(!el) return;
  const w=document.createElement('div');
  w.className='msg-edit-wrap'; w.dataset.editwrap=msgId;
  w.innerHTML=`<textarea class="msg-edit-input" rows="2">${esc(text)}</textarea><div class="msg-edit-btns"><button class="msg-edit-save">Сохранить</button><button class="msg-edit-cancel">Отмена</button><span class="msg-edit-hint">Esc — отмена</span></div>`;
  el.replaceWith(w);
  const ta=w.querySelector('textarea');
  ta.focus(); ta.setSelectionRange(ta.value.length,ta.value.length);
  ta.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();saveEdit(msgId,ta.value);}if(e.key==='Escape')cancelEdit();});
  w.querySelector('.msg-edit-save').addEventListener('click',()=>saveEdit(msgId,ta.value));
  w.querySelector('.msg-edit-cancel').addEventListener('click',cancelEdit);
}
function cancelEdit(){if(!editingId)return;document.querySelector(`[data-editwrap="${editingId}"]`)?.remove();editingId=null;}
async function saveEdit(msgId,t){
  const tx=t.trim(); if(!tx||!currentCh) return;
  try{await updateDoc(doc(fdb,'pulsar_channels',currentCh.id,'messages',msgId),{text:tx,edited:true,editedAt:serverTimestamp()});editingId=null;}
  catch(e){toast('Ошибка: '+e.message,'err');}
}
async function delMsg(msgId){
  if(!currentCh) return;
  try{await updateDoc(doc(fdb,'pulsar_channels',currentCh.id,'messages',msgId),{deleted:true,text:''});}
  catch(e){toast('Ошибка: '+e.message,'err');}
}
async function toggleReact(msgId,emoji){
  if(!currentCh||!me) return;
  const ref=doc(fdb,'pulsar_channels',currentCh.id,'messages',msgId);
  try{
    const s=await getDoc(ref); if(!s.exists()) return;
    const users=(s.data().reactions||{})[emoji]||[];
    await updateDoc(ref,{[`reactions.${emoji}`]:users.includes(me.uid)?arrayRemove(me.uid):arrayUnion(me.uid)});
  }catch(e){console.error('react:',e);}
}

async function sendMessage(){
  const input=$('msg-input'), text=input.value.trim();
  if(!text||!currentCh) return;
  input.value=''; ar(input); $('btn-send').disabled=true;
  const payload={text,authorId:me.uid,authorName:me.displayName||me.email,ts:serverTimestamp(),clientTs:Date.now(),edited:false,deleted:false,reactions:{},replyTo:replyTo||null};
  clearReply();
  try{
    await addDoc(collection(fdb,'pulsar_channels',currentCh.id,'messages'),payload);
    await updateDoc(doc(fdb,'pulsar_channels',currentCh.id),{lastMessage:{text:text.slice(0,80),authorName:me.displayName,ts:serverTimestamp()}});
  }catch(e){toast('Ошибка отправки: '+e.message,'err');input.value=text;$('btn-send').disabled=false;}
}
function scrollBot(){requestAnimationFrame(()=>{const l=$('msg-list');l.scrollTop=l.scrollHeight;});}
function clearReply(){replyTo=null;$('reply-bar').classList.remove('visible');$('reply-to-name').textContent='';$('reply-preview').textContent='';}

// FIX: createChannel — loading state + visible error
async function createChannel(){
  const name=$('ch-new-name').value.trim().toLowerCase().replace(/\s+/g,'-').replace(/[^a-zа-яё0-9\-]/gi,'');
  const desc=$('ch-new-desc').value.trim(), type=$('ch-new-type').value;
  const errEl=$('ch-create-err'); errEl.style.display='none';
  if(!name){errEl.textContent='Введите название канала';errEl.style.display='block';$('ch-new-name').focus();return;}
  const btn=$('btn-create-channel');
  btn.textContent='Создание…'; btn.disabled=true;
  try{
    const snap=await getDocs(query(collection(fdb,'pulsar_channels'),orderBy('order','asc')));
    const maxO=snap.docs.reduce((m,d)=>Math.max(m,d.data().order||0),0);
    await addDoc(collection(fdb,'pulsar_channels'),{name,description:desc,type,createdBy:me.uid,createdAt:serverTimestamp(),order:maxO+1,members:[],lastMessage:null});
    closeModal('modal-channel');
    $('ch-new-name').value=''; $('ch-new-desc').value='';
    toast('Канал #'+name+' создан ✓','ok');
  }catch(e){
    console.error('createChannel:',e);
    errEl.textContent='Ошибка: '+(e.message||'нет доступа. Проверьте правила Firestore.');
    errEl.style.display='block';
  }finally{btn.textContent='Создать канал';btn.disabled=false;}
}

async function openOrCreateDM(otherUid){
  const members=[me.uid,otherUid].sort();
  try{
    const snap=await getDocs(query(collection(fdb,'pulsar_channels'),where('type','==','direct'),where('members','==',members)));
    if(!snap.empty){closeModal('modal-dm');openChannel(snap.docs[0].id);return;}
    const ref=await addDoc(collection(fdb,'pulsar_channels'),{type:'direct',members,createdBy:me.uid,createdAt:serverTimestamp(),order:9999,lastMessage:null});
    closeModal('modal-dm'); openChannel(ref.id);
  }catch(e){toast('Ошибка: '+e.message,'err');}
}

// FIX: DM search — waits for users, shows all when empty
function renderDMUserSearch(q){
  const list=$('dm-user-list');
  if(!usersLoaded){list.innerHTML='<div style="padding:12px;font-size:.73rem;color:var(--muted)">Загрузка пользователей…</div>';return;}
  const ql=q.toLowerCase().trim();
  const users=Object.values(allUsers).filter(u=>u.uid!==me.uid).filter(u=>!ql||(u.displayName||'').toLowerCase().includes(ql)||(u.email||'').toLowerCase().includes(ql));
  if(!users.length){
    list.innerHTML=`<div style="padding:14px;font-size:.73rem;color:var(--muted);text-align:center">${ql?`Никого не найдено по «${esc(q)}»`:'Нет других пользователей'}</div>`;
    return;
  }
  list.innerHTML=users.map(u=>{
    const pr=u.presence?.status||'offline';
    return `<div class="dm-item" data-uid="${esc(u.uid)}" role="button" tabindex="0" style="padding:9px 8px;border-radius:var(--r)">
      <div class="dm-avatar">${ini(u.displayName||u.email)}<div class="presence-dot ${pr}"></div></div>
      <div><div style="font-size:.76rem;font-weight:500;color:var(--text)">${esc(u.displayName||'—')}</div><div style="font-size:.62rem;color:var(--muted)">${esc(u.email||'')}${pr==='online'?' · <span style="color:var(--green)">в сети</span>':''}</div></div>
    </div>`;
  }).join('');
  list.querySelectorAll('.dm-item').forEach(el=>{
    el.addEventListener('mouseenter',()=>el.style.background='var(--surface-3)');
    el.addEventListener('mouseleave',()=>el.style.background='');
    el.addEventListener('click',()=>openOrCreateDM(el.dataset.uid));
  });
}

function openModal(id){$(id)?.classList.add('open');}
function closeModal(id){$(id)?.classList.remove('open');}
function openSidebar(){$('sidebar').classList.add('open');$('mob-overlay').classList.add('open');}
function closeSidebar(){$('sidebar').classList.remove('open');$('mob-overlay').classList.remove('open');}

function initUI(){
  const input=$('msg-input');
  input.addEventListener('input',()=>{ar(input);$('btn-send').disabled=!input.value.trim();});
  input.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}});
  $('btn-send').addEventListener('click',sendMessage);
  $('reply-close').addEventListener('click',clearReply);

  // Emoji
  const picker=$('emoji-picker');
  picker.innerHTML=EMOJIS.map(e=>`<div class="ep-emoji" data-emoji="${e}">${e}</div>`).join('');
  picker.querySelectorAll('.ep-emoji').forEach(el=>el.addEventListener('click',()=>{input.value+=el.dataset.emoji;input.focus();$('btn-send').disabled=!input.value.trim();picker.classList.remove('open');}));
  $('emoji-toggle').addEventListener('click',e=>{e.stopPropagation();picker.classList.toggle('open');});
  document.addEventListener('click',e=>{if(!picker.contains(e.target)&&e.target!==$('emoji-toggle'))picker.classList.remove('open');});

  // Channel creation
  $('btn-new-channel').addEventListener('click',()=>{$('ch-create-err').style.display='none';openModal('modal-channel');setTimeout(()=>$('ch-new-name').focus(),100);});
  $('btn-create-channel').addEventListener('click',createChannel);
  $('ch-new-name').addEventListener('keydown',e=>{if(e.key==='Enter')createChannel();});

  // DM
  $('btn-new-dm').addEventListener('click',()=>{
    $('dm-search').value='';
    openModal('modal-dm');
    // FIX: populate immediately — users are already loaded
    renderDMUserSearch('');
    setTimeout(()=>$('dm-search').focus(),100);
  });
  $('dm-search').addEventListener('input',e=>renderDMUserSearch(e.target.value));

  // Members
  $('btn-members').addEventListener('click',()=>{
    if(!currentCh) return;
    const body=$('modal-members-body'), users=Object.values(allUsers);
    body.innerHTML=users.length?users.map(u=>{
      const pr=u.presence?.status||'offline';
      return `<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)">
        <div class="dm-avatar" style="width:30px;height:30px;border-radius:8px;flex-shrink:0;position:relative">${ini(u.displayName||u.email)}<div class="presence-dot ${pr}"></div></div>
        <div><div style="font-size:.76rem;font-weight:500">${esc(u.displayName||u.email||'—')}</div><div style="font-size:.62rem;color:var(--muted)">${esc(u.role||'user')} · ${pr==='online'?'<span style="color:var(--green)">В сети</span>':'Не в сети'}</div></div>
      </div>`;
    }).join(''):'<div style="color:var(--muted);font-size:.75rem;padding:8px 0">Нет пользователей</div>';
    openModal('modal-members');
  });

  // Close modals
  document.querySelectorAll('[data-modal]').forEach(b=>b.addEventListener('click',()=>closeModal(b.dataset.modal)));
  document.querySelectorAll('.modal-overlay').forEach(ov=>ov.addEventListener('click',e=>{if(e.target===ov)closeModal(ov.id);}));
  document.addEventListener('keydown',e=>{if(e.key==='Escape')document.querySelectorAll('.modal-overlay.open').forEach(el=>closeModal(el.id));});

  // Mobile nav
  $('mob-menu-btn').addEventListener('click',openSidebar);
  $('mob-overlay').addEventListener('click',closeSidebar);
  $('nc-open-sidebar').addEventListener('click',openSidebar);

  $('mob-btn-channels').addEventListener('click',()=>{
    document.querySelectorAll('.mob-nav-btn').forEach(b=>b.classList.remove('active'));
    $('mob-btn-channels').classList.add('active');
    $('sb-dm-section').style.display='none';
    $('sb-ch-section').style.display='';
    openSidebar();
  });
  $('mob-btn-dms').addEventListener('click',()=>{
    document.querySelectorAll('.mob-nav-btn').forEach(b=>b.classList.remove('active'));
    $('mob-btn-dms').classList.add('active');
    $('sb-ch-section').style.display='none';
    $('sb-dm-section').style.display='';
    openSidebar();
  });
  $('mob-btn-new').addEventListener('click',()=>{$('ch-create-err').style.display='none';openModal('modal-channel');setTimeout(()=>$('ch-new-name').focus(),100);});
  $('mob-btn-profile').addEventListener('click',openSidebar);

  // System buttons
  $('btn-logout').addEventListener('click',async()=>{if(!confirm('Выйти из Pulsar?'))return;await updatePresence('offline');await signOut(auth);location.replace('login.html');});
  $('btn-settings').addEventListener('click',()=>toast('Настройки — скоро','ok'));
  $('btn-mute').addEventListener('click',()=>toast('Уведомления — скоро','ok'));
}
</script>
</body>
</html>
