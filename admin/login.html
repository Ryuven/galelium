<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Вход | Galelium Admin</title>
  <meta name="robots" content="noindex, nofollow" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="style"
    href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap"
    onload="this.onload=null;this.rel='stylesheet'" />
  <noscript>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" />
  </noscript>

  <style>
    /* ══ ТОКЕНЫ — один в один с dashboard ══════════════════ */
    :root {
      --bg:           #08080d;
      --bg-2:         #0d0d14;
      --surface:      #101018;
      --surface-2:    #161620;
      --surface-3:    #1c1c2a;
      --border:       rgba(255,255,255,.065);
      --border-h:     rgba(255,255,255,.12);
      --accent:       #c8a96e;
      --accent-dim:   rgba(200,169,110,.09);
      --accent-mid:   rgba(200,169,110,.28);
      --text:         #e4e2dc;
      --muted:        #78766e;
      --muted-2:      #48463f;
      --muted-3:      #2e2c27;
      --green:        #4caf82;
      --red:          #d06070;
      --font-display: 'Syne', sans-serif;
      --font-sans:    'DM Sans', system-ui, sans-serif;
      --ease:   cubic-bezier(.4,0,.2,1);
      --t:      .22s;
      --tf:     .14s;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; -webkit-text-size-adjust: 100%; }
    body {
      background: var(--bg); color: var(--text);
      font-family: var(--font-sans); font-weight: 300;
      min-height: 100svh; overflow: hidden;
      -webkit-font-smoothing: antialiased;
      display: flex; align-items: center; justify-content: center;
    }

    /* ══ ФОН — сетка (точь-в-точь как в dashboard #lock) ══ */
    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
    }

    /* Слабое свечение за карточкой */
    body::after {
      content: '';
      position: fixed; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse 60% 60% at 50% 50%,
        rgba(200,169,110,.04) 0%, transparent 70%);
    }

    /* ══ ПРОГРЕСС-ПОЛОСКА FIREBASE ══════════════════════════ */
    .fb-bar {
      position: fixed; top: 0; left: 0; right: 0; height: 2px; z-index: 999;
      background: linear-gradient(90deg, var(--accent), var(--accent-mid), transparent);
      transform-origin: left; transform: scaleX(0);
      transition: transform .4s var(--ease);
    }
    .fb-bar.loading { transform: scaleX(.65); }
    .fb-bar.done    { transform: scaleX(1); opacity: 0; transition: transform .2s, opacity .3s ease .2s; }

    /* ══ КАРТОЧКА — точно как .lock-panel в dashboard ══════ */
    .lock-panel {
      position: relative; z-index: 1;
      width: min(400px, calc(100vw - 32px));
      background: var(--surface);
      border: 1px solid var(--border);

      /* Анимация появления */
      animation: fadeUp .4s var(--ease) both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Золотая полоска сверху — как в dashboard */
    .lock-panel::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--accent), transparent 60%);
    }

    /* ══ ШАПКА КАРТОЧКИ ═════════════════════════════════════ */
    .lock-head {
      padding: 28px 28px 24px;
      border-bottom: 1px solid var(--border);
    }
    .lock-corp {
      font-size: .55rem; letter-spacing: .3em; text-transform: uppercase;
      color: var(--muted-2); margin-bottom: 18px;
      display: flex; align-items: center; gap: 8px;
    }
    .lock-corp::before {
      content: ''; display: block; width: 18px; height: 1px; background: var(--muted-3);
    }
    .lock-title {
      font-family: var(--font-display); font-weight: 800;
      font-size: 1.7rem; color: #fff; line-height: 1; letter-spacing: -.02em;
    }
    .lock-title em { color: var(--accent); font-style: normal; }
    .lock-subtitle {
      font-size: .74rem; color: var(--muted); margin-top: 6px;
    }

    /* ══ ТЕЛО КАРТОЧКИ ══════════════════════════════════════ */
    .lock-body { padding: 22px 28px 26px; }

    /* Алерт ошибки */
    .lock-alert {
      display: none; align-items: flex-start; gap: 9px;
      background: rgba(208,96,112,.07); border: 1px solid rgba(208,96,112,.22);
      padding: 10px 13px; margin-bottom: 16px;
      font-size: .74rem; color: var(--muted); line-height: 1.5;
    }
    .lock-alert.show { display: flex; }
    .lock-alert strong { display: block; color: var(--red); font-size: .72rem; margin-bottom: 1px; }

    /* Поле ввода */
    .lock-field { position: relative; margin-bottom: 10px; }
    .lock-label {
      font-size: .56rem; letter-spacing: .2em; text-transform: uppercase;
      color: var(--muted-2); display: block; margin-bottom: 6px;
    }
    .lock-input {
      width: 100%; background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text); font-family: var(--font-sans);
      font-size: .9rem; font-weight: 400;
      padding: 12px 44px 12px 14px; outline: none;
      transition: border-color var(--tf);
    }
    .lock-input:focus   { border-color: var(--accent-mid); }
    .lock-input.err     { border-color: rgba(208,96,112,.5); animation: shake .35s ease; }
    .lock-input::placeholder { color: var(--muted-2); }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%,60% { transform: translateX(-6px); }
      40%,80% { transform: translateX(6px); }
    }

    /* Кнопка глаза */
    .lock-eye {
      position: absolute; right: 0; bottom: 0;
      width: 42px; height: 42px;
      background: none; border: none; cursor: pointer; color: var(--muted-2);
      display: flex; align-items: center; justify-content: center;
      transition: color var(--tf);
    }
    .lock-eye:hover { color: var(--muted); }

    /* Мини-ошибка под полем */
    .lock-field-err {
      font-size: .64rem; color: var(--red);
      margin-top: 5px; display: none;
    }
    .lock-field-err.show { display: block; }

    /* Разделитель "или" */
    .lock-or {
      display: flex; align-items: center; gap: 10px;
      margin: 14px 0; color: var(--muted-2);
      font-size: .58rem; letter-spacing: .18em; text-transform: uppercase;
    }
    .lock-or::before, .lock-or::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    /* Кнопка Google */
    .lock-google {
      width: 100%; padding: 10px;
      background: var(--surface-2); border: 1px solid var(--border);
      color: var(--muted); font-family: var(--font-sans); font-size: .76rem;
      cursor: pointer; margin-bottom: 14px;
      display: flex; align-items: center; justify-content: center; gap: 9px;
      transition: border-color var(--tf), color var(--tf), background var(--tf);
    }
    .lock-google:hover { border-color: var(--border-h); color: var(--text); background: var(--surface-3); }

    /* Строка «Запомнить + забыл пароль» */
    .lock-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px; gap: 10px;
    }
    .lock-remember {
      display: flex; align-items: center; gap: 7px;
      font-size: .7rem; color: var(--muted); cursor: pointer; user-select: none;
    }
    .lock-remember input { accent-color: var(--accent); cursor: pointer; }
    .lock-forgot {
      font-size: .66rem; color: var(--muted-2); letter-spacing: .04em;
      background: none; border: none; cursor: pointer;
      transition: color var(--tf); padding: 0;
      border-bottom: 1px solid transparent;
    }
    .lock-forgot:hover { color: var(--accent); border-color: var(--accent-mid); }

    /* Основная кнопка входа — точно как lock-submit в dashboard */
    .lock-submit {
      width: 100%; padding: 12px;
      background: var(--accent); color: #08080d;
      font-family: var(--font-display); font-weight: 800;
      font-size: .68rem; letter-spacing: .16em; text-transform: uppercase;
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: opacity var(--tf);
      position: relative; overflow: hidden;
    }
    .lock-submit:hover:not(:disabled) { opacity: .85; }
    .lock-submit:disabled { opacity: .5; cursor: not-allowed; }

    /* Спиннер */
    .lock-spinner {
      width: 14px; height: 14px; border-radius: 50%;
      border: 2px solid rgba(8,8,13,.2);
      border-top-color: #08080d;
      animation: spin .7s linear infinite; display: none; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .lock-submit.loading .lock-spinner { display: block; }
    .lock-submit.loading .lock-submit-txt { opacity: .5; }

    /* Статус Firebase внизу */
    .lock-status {
      margin-top: 14px; display: flex; align-items: center; gap: 7px;
      font-size: .6rem; color: var(--muted-2); letter-spacing: .06em;
    }
    .lock-status-dot {
      width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0;
      background: #d4a843;   /* жёлтый — загрузка */
    }
    .lock-status-dot.ok  { background: var(--green); animation: pg 2.4s ease-in-out infinite; }
    .lock-status-dot.err { background: var(--red); }
    @keyframes pg { 0%,100%{box-shadow:0 0 0 0 rgba(76,175,130,.4)} 50%{box-shadow:0 0 0 5px rgba(76,175,130,0)} }

    /* ══ АДАПТИВ ════════════════════════════════════════════ */
    @media (max-width: 480px) {
      .lock-head  { padding: 22px 20px 18px; }
      .lock-body  { padding: 18px 20px 22px; }
    }
  </style>
</head>
<body>

<div class="fb-bar" id="fb-bar"></div>

<div class="lock-panel" role="main">

  <!-- Шапка -->
  <div class="lock-head">
    <div class="lock-corp">Galelium Corporation</div>
    <div class="lock-title">Admin<br><em>Panel</em></div>
    <div class="lock-subtitle">Введите учётные данные для доступа</div>
  </div>

  <!-- Тело -->
  <div class="lock-body">

    <!-- Алерт ошибки -->
    <div class="lock-alert" id="lock-alert" role="alert">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style="flex-shrink:0;margin-top:1px">
        <circle cx="7" cy="7" r="5.5" stroke="var(--red)" stroke-width="1.2"/>
        <path d="M7 4.5v3M7 9v.5" stroke="var(--red)" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
      <div>
        <strong id="alert-title">Ошибка</strong>
        <span id="alert-msg"></span>
      </div>
    </div>

    <!-- Email -->
    <div class="lock-field">
      <label class="lock-label" for="inp-email">Email</label>
      <input type="email" id="inp-email" class="lock-input"
        placeholder="admin@galelium.com"
        autocomplete="email" autofocus inputmode="email" />
      <div class="lock-field-err" id="err-email">Введите корректный email</div>
    </div>

    <!-- Пароль -->
    <div class="lock-field">
      <label class="lock-label" for="inp-pass">Пароль</label>
      <input type="password" id="inp-pass" class="lock-input"
        placeholder="••••••••••"
        autocomplete="current-password" />
      <button class="lock-eye" id="eye-btn" type="button" aria-label="Показать/скрыть пароль">
        <svg id="eye-show" width="15" height="15" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="2.5" stroke="currentColor" stroke-width="1.3"/>
          <path d="M1.5 8c1.5-3.5 4-5.5 6.5-5.5s5 2 6.5 5.5c-1.5 3.5-4 5.5-6.5 5.5S3 11.5 1.5 8z" stroke="currentColor" stroke-width="1.3"/>
        </svg>
        <svg id="eye-hide" width="15" height="15" viewBox="0 0 16 16" fill="none" style="display:none">
          <path d="M2 2l12 12M6.5 6.6A2.5 2.5 0 0 0 9.4 9.5M4 4.3A6.4 6.4 0 0 0 1.5 8c1.5 3.5 4 5.5 6.5 5.5 1.3 0 2.5-.4 3.5-1.1M7 2.6c.3-.1.7-.1 1-.1 2.5 0 5 2 6.5 5.5a8.4 8.4 0 0 1-1.8 2.6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
      </button>
      <div class="lock-field-err" id="err-pass">Введите пароль</div>
    </div>

    <!-- Запомнить + Забыл пароль -->
    <div class="lock-row">
      <label class="lock-remember">
        <input type="checkbox" id="inp-remember" />
        Запомнить меня
      </label>
      <button class="lock-forgot" id="btn-forgot" type="button">Забыли пароль?</button>
    </div>

    <!-- Кнопка входа -->
    <button class="lock-submit" id="btn-login" type="button">
      <span class="lock-submit-txt">Войти →</span>
      <span class="lock-spinner" aria-hidden="true"></span>
    </button>

    <!-- Или -->
    <div class="lock-or">или</div>

    <!-- Google -->
    <button class="lock-google" id="btn-google" type="button">
      <svg width="16" height="16" viewBox="0 0 48 48" aria-hidden="true">
        <path fill="#FFC107" d="M43.6 20H24v8h11.3C33.6 32.9 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.7 1.1 7.8 2.9l5.7-5.7C34.1 6.6 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 20-9 20-20 0-1.3-.1-2.7-.4-4z"/>
        <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 15.9 19 13 24 13c3 0 5.7 1.1 7.8 2.9l5.7-5.7C34.1 6.6 29.3 4 24 4 16.3 4 9.7 8.4 6.3 14.7z"/>
        <path fill="#4CAF50" d="M24 44c5.2 0 9.9-1.9 13.5-5l-6.2-5.2C29.4 35.5 26.8 36 24 36c-5.2 0-9.6-3-11.4-7.4l-6.6 5.1C9.8 39.7 16.4 44 24 44z"/>
        <path fill="#1976D2" d="M43.6 20H24v8h11.3c-1 3-3.5 5.5-6.5 7l6.2 5.2C39.3 37 44 31 44 24c0-1.3-.1-2.7-.4-4z"/>
      </svg>
      Войти через Google
    </button>

    <!-- Статус Firebase -->
    <div class="lock-status">
      <span class="lock-status-dot" id="status-dot"></span>
      <span id="status-text">Подключение к Firebase…</span>
    </div>

  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp }
    from 'https://www.gstatic.com/firebasejs/11.8.1/firebase-app.js';
  import {
    getAuth, signInWithEmailAndPassword, signInWithPopup,
    GoogleAuthProvider, onAuthStateChanged, sendPasswordResetEmail,
    setPersistence, browserLocalPersistence, browserSessionPersistence
  } from 'https://www.gstatic.com/firebasejs/11.8.1/firebase-auth.js';

  /* ── КОНФИГ ─────────────────────────────────────────────── */
  const firebaseConfig = {
    apiKey:            "AIzaSyC4PKkma67vVXeZvlSv0MNRK5cQvcAvjpg",
    authDomain:        "admingalelium.firebaseapp.com",
    databaseURL:       "https://admingalelium-default-rtdb.firebaseio.com",
    projectId:         "admingalelium",
    storageBucket:     "admingalelium.firebasestorage.app",
    messagingSenderId: "565330048254",
    appId:             "1:565330048254:web:bab36aae480989e2bfe1af",
    measurementId:     "G-8FRC70X54D"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  /* ── ЭЛЕМЕНТЫ ───────────────────────────────────────────── */
  const emailEl    = document.getElementById('inp-email');
  const passEl     = document.getElementById('inp-pass');
  const remEl      = document.getElementById('inp-remember');
  const btnLogin   = document.getElementById('btn-login');
  const btnGoogle  = document.getElementById('btn-google');
  const btnForgot  = document.getElementById('btn-forgot');
  const eyeBtn     = document.getElementById('eye-btn');
  const eyeShow    = document.getElementById('eye-show');
  const eyeHide    = document.getElementById('eye-hide');
  const alertEl    = document.getElementById('lock-alert');
  const alertTitle = document.getElementById('alert-title');
  const alertMsg   = document.getElementById('alert-msg');
  const errEmail   = document.getElementById('err-email');
  const errPass    = document.getElementById('err-pass');
  const fbBar      = document.getElementById('fb-bar');
  const statusDot  = document.getElementById('status-dot');
  const statusText = document.getElementById('status-text');

  /* ── ПРОГРЕСС-ПОЛОСКА ───────────────────────────────────── */
  fbBar.classList.add('loading');

  /* ── АВТО-РЕДИРЕКТ ЕСЛИ УЖЕ В СЕССИИ ───────────────────── */
  onAuthStateChanged(auth, (user) => {
    fbBar.classList.remove('loading');
    fbBar.classList.add('done');
    if (user) {
      statusDot.className  = 'lock-status-dot ok';
      statusText.textContent = 'Авторизован · ' + (user.email || '') + ' — переход…';
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 500);
    } else {
      statusDot.className  = 'lock-status-dot ok';
      statusText.textContent = 'Firebase подключён';
    }
  });

  /* ── ПОКАЗАТЬ / СКРЫТЬ ПАРОЛЬ ───────────────────────────── */
  eyeBtn.addEventListener('click', () => {
    const show = passEl.type === 'password';
    passEl.type = show ? 'text' : 'password';
    eyeShow.style.display = show ? 'none' : '';
    eyeHide.style.display = show ? ''     : 'none';
    passEl.focus();
  });

  /* ── УТИЛИТЫ ────────────────────────────────────────────── */
  function setLoading(on) {
    btnLogin.disabled  = on;
    btnGoogle.disabled = on;
    btnLogin.classList.toggle('loading', on);
  }

  function showAlert(title, msg) {
    alertTitle.textContent = title;
    alertMsg.textContent   = msg;
    alertEl.classList.add('show');
  }

  function hideAlert() { alertEl.classList.remove('show'); }

  function fieldErr(el, errEl, msg) {
    errEl.textContent = msg;
    errEl.classList.add('show');
    el.classList.add('err');
    setTimeout(() => el.classList.remove('err'), 400);
  }

  function clearErrors() {
    [emailEl, passEl].forEach(el => el.classList.remove('err'));
    [errEmail, errPass].forEach(el => el.classList.remove('show'));
    hideAlert();
  }

  /* Перевод ошибок Firebase */
  function fbErr(code) {
    const m = {
      'auth/user-not-found':         ['Пользователь не найден', 'Аккаунта с таким email не существует.'],
      'auth/wrong-password':         ['Неверный пароль', 'Введите правильный пароль или сбросьте его.'],
      'auth/invalid-credential':     ['Неверные данные', 'Email или пароль введены неправильно.'],
      'auth/invalid-email':          ['Некорректный email', 'Введите правильный адрес электронной почты.'],
      'auth/too-many-requests':      ['Слишком много попыток', 'Аккаунт временно заблокирован. Попробуйте позже.'],
      'auth/user-disabled':          ['Аккаунт отключён', 'Этот аккаунт деактивирован.'],
      'auth/network-request-failed': ['Ошибка сети', 'Проверьте подключение к интернету.'],
      'auth/popup-closed-by-user':   ['Окно закрыто', 'Вы закрыли окно Google. Попробуйте снова.'],
    };
    return m[code] || ['Ошибка входа', 'Что-то пошло не так. Попробуйте ещё раз.'];
  }

  /* ── ВАЛИДАЦИЯ ──────────────────────────────────────────── */
  function validate() {
    clearErrors();
    let ok = true;
    const email = emailEl.value.trim();
    const pass  = passEl.value;
    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      fieldErr(emailEl, errEmail, email ? 'Некорректный формат email' : 'Введите email');
      ok = false;
    }
    if (!pass) {
      fieldErr(passEl, errPass, 'Введите пароль');
      ok = false;
    }
    return ok;
  }

  /* ── ВХОД EMAIL + ПАРОЛЬ ────────────────────────────────── */
  async function doLogin() {
    if (!validate()) return;
    setLoading(true);
    try {
      const persistence = remEl.checked
        ? browserLocalPersistence
        : browserSessionPersistence;
      await setPersistence(auth, persistence);
      await signInWithEmailAndPassword(auth, emailEl.value.trim(), passEl.value);
      /* onAuthStateChanged перехватит и сделает redirect */
    } catch (err) {
      const [t, m] = fbErr(err.code);
      showAlert(t, m);
      passEl.value = '';
      passEl.focus();
      setLoading(false);
    }
  }

  btnLogin.addEventListener('click', doLogin);
  [emailEl, passEl].forEach(el => {
    el.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
    el.addEventListener('input',   () => { hideAlert(); el.classList.remove('err'); });
  });

  /* ── ВХОД ЧЕРЕЗ GOOGLE ──────────────────────────────────── */
  btnGoogle.addEventListener('click', async () => {
    clearErrors();
    setLoading(true);
    try {
      await signInWithPopup(auth, new GoogleAuthProvider());
    } catch (err) {
      if (err.code !== 'auth/cancelled-popup-request' &&
          err.code !== 'auth/popup-closed-by-user') {
        const [t, m] = fbErr(err.code);
        showAlert(t, m);
      }
      setLoading(false);
    }
  });

  /* ── СБРОС ПАРОЛЯ ───────────────────────────────────────── */
  btnForgot.addEventListener('click', async () => {
    const email = emailEl.value.trim();
    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      fieldErr(emailEl, errEmail, 'Введите email выше для сброса пароля');
      emailEl.focus();
      return;
    }
    try {
      await sendPasswordResetEmail(auth, email);
      /* Показываем в том же алерте, но зелёным */
      alertTitle.textContent = 'Письмо отправлено';
      alertTitle.style.color = 'var(--green)';
      alertMsg.textContent   = 'Проверьте почту ' + email + ' — там ссылка для сброса.';
      alertEl.style.background = 'rgba(76,175,130,.07)';
      alertEl.style.borderColor = 'rgba(76,175,130,.22)';
      alertEl.classList.add('show');
    } catch (err) {
      const [t, m] = fbErr(err.code);
      showAlert(t, m);
    }
  });
</script>

</body>
</html>
