<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Liberty Mobile — вход</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0f0f12;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .card {
            background: rgba(18, 18, 24, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 32px 28px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 215, 0, 0.15);
            border: 1px solid rgba(255, 215, 0, 0.2);
        }

        .emblem {
            text-align: center;
            margin-bottom: 32px;
        }

        .emblem-icon {
            font-size: 48px;
            margin-bottom: 12px;
            opacity: 0.9;
        }

        h1 {
            font-size: 26px;
            font-weight: 600;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #FFD700 0%, #DAA520 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 6px;
        }

        .sub {
            font-size: 12px;
            color: #888;
            font-weight: 400;
        }

        .input-group {
            margin-bottom: 18px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(30, 30, 38, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            font-size: 15px;
            color: #fff;
            transition: all 0.2s ease;
            outline: none;
        }

        input:focus {
            border-color: #FFD700;
            background: #1e1e26;
        }

        input::placeholder {
            color: #5a5a6e;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 12px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #FFD700 0%, #DAA520 100%);
            color: #0a0a0e;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(255, 215, 0, 0.25);
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid rgba(255, 215, 0, 0.4);
            color: #FFD700;
        }

        .btn-secondary:hover {
            background: rgba(255, 215, 0, 0.08);
            border-color: #FFD700;
        }

        .btn-google {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-google:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 24px 0 16px;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }

        .divider-text {
            font-size: 11px;
            color: #5a5a6e;
            text-transform: uppercase;
        }

        .message {
            padding: 12px;
            border-radius: 20px;
            font-size: 13px;
            text-align: center;
            margin-bottom: 20px;
            animation: fadeIn 0.2s ease;
        }

        .message-error {
            background: rgba(220, 53, 69, 0.12);
            border: 1px solid rgba(220, 53, 69, 0.3);
            color: #ff8a92;
        }

        .message-success {
            background: rgba(255, 215, 0, 0.08);
            border: 1px solid rgba(255, 215, 0, 0.3);
            color: #FFD700;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="emblem">
                <div class="emblem-icon">☭</div>
                <h1>LIBERTY</h1>
                <div class="sub">вход в лаунчер</div>
            </div>

            <div id="message"></div>

            <div class="input-group">
                <input type="email" id="email" placeholder="Email" autocomplete="email">
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="Пароль" autocomplete="current-password">
            </div>

            <button id="loginBtn" class="btn-primary">Войти</button>

            <div class="divider">
                <div class="divider-line"></div>
                <div class="divider-text">или</div>
                <div class="divider-line"></div>
            </div>

            <button id="googleBtn" class="btn-google">
                <span>G</span> Войти через Google
            </button>

            <button id="registerBtn" class="btn-secondary">Создать аккаунт</button>
            <button id="resetBtn" class="btn-secondary" style="margin-top: 8px;">Восстановить пароль</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC4PKkma67vVXeZvlSv0MNRK5cQvcAvjpg",
            authDomain: "admingalelium.firebaseapp.com",
            projectId: "admingalelium",
            storageBucket: "admingalelium.firebasestorage.app",
            messagingSenderId: "565330048254",
            appId: "1:565330048254:web:bab36aae480989e2bfe1af"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const googleProvider = new GoogleAuthProvider();

        const messageDiv = document.getElementById('message');

        function showMessage(text, isError = true) {
            messageDiv.innerHTML = `<div class="message ${isError ? 'message-error' : 'message-success'}">${text}</div>`;
            setTimeout(() => {
                if (messageDiv.innerHTML) messageDiv.innerHTML = '';
            }, 3500);
        }

        // Email/пароль вход
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email || !password) {
                showMessage('Заполните все поля');
                return;
            }

            try {
                await signInWithEmailAndPassword(auth, email, password);
                localStorage.setItem('isLoggedIn', 'true');
                window.location.href = 'dashboard.html';
            } catch (error) {
                if (error.code === 'auth/invalid-credential') showMessage('Неверный email или пароль');
                else if (error.code === 'auth/user-not-found') showMessage('Пользователь не найден');
                else showMessage('Ошибка: ' + error.message);
            }
        });

        // Google вход
        document.getElementById('googleBtn').addEventListener('click', async () => {
            try {
                const result = await signInWithPopup(auth, googleProvider);
                localStorage.setItem('isLoggedIn', 'true');
                window.location.href = 'dashboard.html';
            } catch (error) {
                if (error.code === 'auth/popup-closed-by-user') {
                    showMessage('Вход отменён');
                } else if (error.code === 'auth/popup-blocked') {
                    showMessage('Браузер заблокировал всплывающее окно');
                } else {
                    showMessage('Ошибка: ' + error.message);
                }
            }
        });

        // Регистрация
        document.getElementById('registerBtn').addEventListener('click', async () => {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email || !password) {
                showMessage('Заполните все поля');
                return;
            }
            if (password.length < 6) {
                showMessage('Пароль должен быть минимум 6 символов');
                return;
            }

            try {
                await createUserWithEmailAndPassword(auth, email, password);
                showMessage('Регистрация успешна! Теперь войдите', false);
            } catch (error) {
                if (error.code === 'auth/email-already-in-use') showMessage('Email уже используется');
                else showMessage('Ошибка: ' + error.message);
            }
        });

        // Сброс пароля
        document.getElementById('resetBtn').addEventListener('click', async () => {
            const email = document.getElementById('email').value.trim();
            if (!email) {
                showMessage('Введите email для сброса пароля');
                return;
            }

            try {
                await sendPasswordResetEmail(auth, email);
                showMessage('Письмо для сброса отправлено!', false);
            } catch (error) {
                showMessage('Ошибка: ' + error.message);
            }
        });

        if (localStorage.getItem('isLoggedIn') === 'true') {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
