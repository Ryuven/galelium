<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Liberty Mobile — дашборд</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0f0f12;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        .container {
            width: 100%;
            max-width: 480px;
            padding: 20px;
        }

        .card {
            background: rgba(18, 18, 24, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 32px 28px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 215, 0, 0.15);
            border: 1px solid rgba(255, 215, 0, 0.2);
        }

        .emblem {
            text-align: center;
            margin-bottom: 32px;
        }

        .emblem-icon {
            font-size: 48px;
            margin-bottom: 12px;
            opacity: 0.9;
        }

        h1 {
            font-size: 26px;
            font-weight: 600;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #FFD700 0%, #DAA520 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .welcome-box {
            background: rgba(30, 30, 38, 0.6);
            border-radius: 28px;
            padding: 28px 20px;
            text-align: center;
            margin-bottom: 28px;
            border: 1px solid rgba(255, 215, 0, 0.1);
        }

        .greeting {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .user-email {
            font-size: 18px;
            font-weight: 500;
            color: #FFD700;
            word-break: break-all;
            background: rgba(255, 215, 0, 0.08);
            display: inline-block;
            padding: 6px 18px;
            border-radius: 40px;
            margin-top: 8px;
        }

        .info-grid {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 32px;
        }

        .info-item {
            background: rgba(30, 30, 38, 0.5);
            border-radius: 20px;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .info-icon {
            font-size: 22px;
        }

        .info-text {
            flex: 1;
        }

        .info-title {
            font-size: 13px;
            color: #888;
            margin-bottom: 2px;
        }

        .info-desc {
            font-size: 14px;
            color: #fff;
            font-weight: 500;
        }

        .btn-logout {
            width: 100%;
            padding: 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 40px;
            font-size: 15px;
            font-weight: 500;
            color: #ff8a8a;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-logout:hover {
            background: rgba(220, 53, 69, 0.15);
            border-color: rgba(220, 53, 69, 0.4);
        }

        .footer-note {
            text-align: center;
            margin-top: 20px;
            font-size: 11px;
            color: #444;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="emblem">
                <div class="emblem-icon">☭</div>
                <h1>LIBERTY</h1>
            </div>

            <div class="welcome-box">
                <div class="greeting">Добро пожаловать, товарищ</div>
                <div class="user-email" id="userEmail">—</div>
            </div>

            <div class="info-grid">
                <div class="info-item">
                    <div class="info-icon">⚡</div>
                    <div class="info-text">
                        <div class="info-title">Статус</div>
                        <div class="info-desc">Авторизован</div>
                    </div>
                </div>
                <div class="info-item">
                    <div class="info-icon">📦</div>
                    <div class="info-text">
                        <div class="info-title">Версия лаунчера</div>
                        <div class="info-desc">3.0.2</div>
                    </div>
                </div>
                <div class="info-item">
                    <div class="info-icon">🎮</div>
                    <div class="info-text">
                        <div class="info-title">Сервер</div>
                        <div class="info-desc">СССР #1</div>
                    </div>
                </div>
            </div>

            <button id="logoutBtn" class="btn-logout">Выйти</button>
            <div class="footer-note">Liberty Mobile Role Play</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC4PKkma67vVXeZvlSv0MNRK5cQvcAvjpg",
            authDomain: "admingalelium.firebaseapp.com",
            projectId: "admingalelium",
            storageBucket: "admingalelium.firebasestorage.app",
            messagingSenderId: "565330048254",
            appId: "1:565330048254:web:bab36aae480989e2bfe1af"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                localStorage.removeItem('isLoggedIn');
                window.location.href = 'index.html';
            } else {
                document.getElementById('userEmail').textContent = user.email;
                localStorage.setItem('isLoggedIn', 'true');
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await signOut(auth);
            localStorage.removeItem('isLoggedIn');
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
