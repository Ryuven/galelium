<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galelium Corporation</title>
  <meta name="description" content="Сайт временно недоступен. Скоро вернёмся." />
  <meta name="robots" content="noindex, nofollow" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="style"
        href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap"
        onload="this.onload=null;this.rel='stylesheet'" />
  <noscript>
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" />
  </noscript>

  <style>
    :root {
      --bg:         #0a0a0f;
      --surface:    #111118;
      --border:     rgba(255,255,255,.06);
      --accent:     #c8a96e;
      --accent-dim: rgba(200,169,110,.08);
      --accent-mid: rgba(200,169,110,.28);
      --text:       #e8e6e0;
      --muted:      #7a7870;
      --muted-2:    #3a3835;
      --font-sans:    'DM Sans', system-ui, sans-serif;
      --font-display: 'Syne', sans-serif;
      --ease: cubic-bezier(.4,0,.2,1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }

    body {
      background:  var(--bg);
      color:       var(--text);
      font-family: var(--font-sans);
      font-weight: 300;
      font-size:   1rem;
      line-height: 1.7;
      min-height:  100svh;
      overflow:    hidden;
      -webkit-font-smoothing:  antialiased;
      -moz-osx-font-smoothing: grayscale;
      display:     flex;
      flex-direction: column;
    }

    /* ── Фоновая сетка ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    /* Градиент-вспышка сверху */
    body::after {
      content: '';
      position: fixed;
      top: -200px; left: 50%;
      transform: translateX(-50%);
      width: 700px; height: 500px;
      background: radial-gradient(ellipse at center, rgba(200,169,110,.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Лого вверху ── */
    .top-bar {
      position: relative; z-index: 1;
      padding: clamp(24px,4vw,40px) clamp(20px,5vw,52px);
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo {
      font-family:    var(--font-display);
      font-weight:    800;
      font-size:      clamp(.85rem,1.2vw,1rem);
      letter-spacing: .07em;
      text-transform: uppercase;
      color:          rgba(255,255,255,.18);
      text-decoration: none;
      user-select: none;
    }
    .logo-dot {
      display: inline-block;
      width:  6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      opacity: .5;
      margin-left: 6px;
      vertical-align: middle;
      position: relative; top: -1px;
    }

    /* ── Центральный блок ── */
    .stage {
      flex: 1;
      position: relative; z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 clamp(20px,5vw,60px) clamp(60px,8vw,100px);
      text-align: center;
    }

    /* Маленький статус-пилюль */
    .status-pill {
      display:        inline-flex;
      align-items:    center;
      gap:            8px;
      padding:        6px 16px;
      border:         1px solid var(--border);
      border-radius:  40px;
      font-size:      .65rem;
      font-weight:    400;
      letter-spacing: .2em;
      text-transform: uppercase;
      color:          rgba(255,255,255,.2);
      margin-bottom:  clamp(28px,4vw,44px);
      animation: fadeUp .6s var(--ease) both;
    }
    .status-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--accent); opacity: .6;
      animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: .6; transform: scale(1); }
      50%      { opacity: 1;  transform: scale(1.4); }
    }

    /* Основной заголовок */
    .main-title {
      font-family:    var(--font-display);
      font-weight:    800;
      font-size:      clamp(2.4rem,7vw,5.5rem);
      line-height:    1.0;
      letter-spacing: -.02em;
      color:          rgba(255,255,255,.08);
      margin-bottom:  clamp(20px,3vw,32px);
      animation: fadeUp .6s .1s var(--ease) both;
      max-width: 700px;
    }
    /* Одно слово чуть светлее — акцент */
    .main-title em {
      font-style: normal;
      color: rgba(255,255,255,.13);
    }

    /* Подзаголовок */
    .sub {
      font-size:   clamp(.88rem,1.4vw,1rem);
      font-weight: 300;
      color:       rgba(255,255,255,.15);
      max-width:   400px;
      line-height: 1.75;
      margin-bottom: clamp(36px,5vw,56px);
      animation: fadeUp .6s .18s var(--ease) both;
    }

    /* Разделитель */
    .divider-line {
      width: 40px; height: 1px;
      background: rgba(255,255,255,.07);
      margin: 0 auto clamp(32px,4vw,48px);
      animation: fadeUp .6s .22s var(--ease) both;
    }

    /* Нижняя строка — ссылка и копирайт */
    .bottom-row {
      display:    flex;
      align-items: center;
      gap:        24px;
      flex-wrap:  wrap;
      justify-content: center;
      animation: fadeUp .6s .26s var(--ease) both;
    }
    .contact-link {
      display:        inline-flex;
      align-items:    center;
      gap:            8px;
      font-size:      .7rem;
      font-weight:    400;
      letter-spacing: .14em;
      text-transform: uppercase;
      color:          rgba(200,169,110,.35);
      text-decoration: none;
      border:         1px solid rgba(200,169,110,.14);
      padding:        9px 20px;
      border-radius:  2px;
      transition:     color .2s, border-color .2s;
    }
    .contact-link:hover { color: rgba(200,169,110,.7); border-color: rgba(200,169,110,.3); }
    .contact-link svg { opacity: .6; }

    .copy-text {
      font-size:   .62rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: rgba(255,255,255,.1);
    }

    /* ── Декоративные угловые штрихи ── */
    .corner {
      position: fixed;
      width: 40px; height: 40px;
      opacity: .12;
    }
    .corner--tl { top: 20px; left: 20px; border-top: 1px solid #fff; border-left: 1px solid #fff; }
    .corner--tr { top: 20px; right: 20px; border-top: 1px solid #fff; border-right: 1px solid #fff; }
    .corner--bl { bottom: 20px; left: 20px; border-bottom: 1px solid #fff; border-left: 1px solid #fff; }
    .corner--br { bottom: 20px; right: 20px; border-bottom: 1px solid #fff; border-right: 1px solid #fff; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .bottom-row { flex-direction: column; gap: 14px; }
    }
  </style>
</head>
<body>

<div class="corner corner--tl"></div>
<div class="corner corner--tr"></div>
<div class="corner corner--bl"></div>
<div class="corner corner--br"></div>

<!-- Лого -->
<div class="top-bar">
  <span class="logo">Galelium Corp.<span class="logo-dot"></span></span>
</div>

<!-- Центр -->
<main class="stage">

  <div class="status-pill">
    <span class="status-dot"></span>
    Страница временно недоступна
  </div>

  <h1 class="main-title">
    Скоро<br><em>вернёмся</em>
  </h1>

  <p class="sub">
    Мы работаем над чем-то.<br>
    Страница будет открыта совсем скоро.
  </p>

  <div class="divider-line"></div>

  <div class="bottom-row">
    <a href="mailto:info@galelium.com" class="contact-link">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
        <rect x="1" y="2.5" width="10" height="7" rx="1" stroke="currentColor" stroke-width="1.1"/>
        <path d="M1 4l5 3.5L11 4" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
      </svg>
      info@galelium.com
    </a>
    <span class="copy-text">© 2025–2026 Galelium Corporation</span>
  </div>

</main>

</body>
</html>
